use_async: true

orchestrator:
  max_iterations: 30
  max_interventions: 500
  accuracy_threshold: 0.90
  error_tolerance: 0.05
  synthesis_interval: 3
  force_exploration_interval: 2
  entropy_convergence_threshold: 0.1
  keep_top_k: 15
  new_candidate_weight: 0.15
  early_stopping_fitness: 0.95
  early_stopping_iterations: 10

cognitive:
  anomaly_threshold: 0.15
  llm_model: "gemma"

strategist:
  use_llm: true
  max_chain_depth: 4
  max_candidates_heuristic: 120
  max_candidates_llm: 25
  num_trials: 4

researcher:
  max_depth: 8
  beam_width: 600
  error_tolerance: 0.05
  top_k_candidates: 30
  use_cvc5: false
  enforce_cvc5_first: false

victim:
  model_name: "meta-llama/llama-3-8b-instruct"
  temperature: 0.0
  max_tokens: 150

red_team:
  enabled: true
  strategies: ["cipher", "roleplay", "crescendo", "skeleton_key"]
  refinement_rounds: 3

synthesis:
  mode: "evolutionary"
  evolutionary:
    population_size: 150
    generations: 50
    mutation_rate: 0.25
    crossover_rate: 0.75
  neural:
    embedding_model: "all-MiniLM-L6-v2"
    bandit_algorithm: "ucb"
  fitness_guided:
    max_depth: 8
    beam_width: 600
  error_tolerance: 0.05

surrogate:
  enabled: true
  model: "mlp"
  feature_type: "embedding"
  min_accuracy: 0.65

causal_graph:
  min_samples_per_group: 10
  use_bayesian: true

transforms:
  disabled: []
