# Single-agent baseline: only synthesizer + evaluator, no cognitive/strategist/red team
use_async: true

orchestrator:
  max_iterations: 30
  max_interventions: 200
  accuracy_threshold: 0.80
  error_tolerance: 0.05
  synthesis_interval: 2
  force_exploration_interval: 5
  entropy_convergence_threshold: 0.2
  keep_top_k: 15
  new_candidate_weight: 0.15
  early_stopping_fitness: 0.95
  early_stopping_iterations: 10
  min_interventions_per_iteration: 2
  uncertainty_sampling_fallback: false
  absolute_max_iterations: 60
  convergence:
    validation_accuracy_threshold: 0.80
    min_improvement: 0.02
    min_iterations_for_convergence: 5
    entropy_threshold: 0.2
  force_exploration:
    enabled: false
    consecutive_iterations_without_intervention: 5
    num_forced_prompts: 2

seed_generation:
  adaptive_expansion: false
  max_expansion_rounds: 1
  expansion_factor: 1

cognitive:
  enabled: false
  anomaly_threshold: 0.15
  adaptive_threshold: false
  multi_signal:
    enabled: false
    signals: ["outcome", "embedding", "length"]
    embedding_percentile: 90
    length_percentile: 95
  anomaly_selection:
    method: "percentile"
    percentile: 85
    min_interventions: 3
    max_interventions: 10
    history_window: 5
    exploration_decay: false
  llm_model: "gemma"

strategist:
  enabled: false
  use_llm: false
  max_chain_depth: 1
  max_candidates_heuristic: 30
  max_candidates_llm: 5
  num_trials: 1

researcher:
  max_depth: 8
  beam_width: 300
  error_tolerance: 0.05
  top_k_candidates: 15
  use_cvc5: false
  enforce_cvc5_first: false

victim:
  model_name: "meta-llama/llama-3.2-3b-instruct"
  temperature: 0.0
  max_tokens: 150

red_team:
  enabled: false
  strategies: []
  refinement_rounds: 0

synthesis:
  mode: "evolutionary"
  evolutionary:
    population_size: 50
    generations: 20
    mutation_rate: 0.25
    crossover_rate: 0.75
  neural:
    embedding_model: "all-MiniLM-L6-v2"
    bandit_algorithm: "ucb"
  fitness_guided:
    max_depth: 8
    beam_width: 300
  error_tolerance: 0.05

surrogate:
  enabled: false
  model: "mlp"
  feature_type: "embedding"
  min_accuracy: 0.65

causal_graph:
  min_samples_per_group: 10
  use_bayesian: true

transforms:
  disabled: []

evaluation:
  program_discriminator:
    enabled: true
  technique_selection:
    mode: "ucb"
  num_variants: 3
