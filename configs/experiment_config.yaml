use_async: true

orchestrator:
  max_iterations: 50
  max_interventions: 1000
  accuracy_threshold: 0.90
  error_tolerance: 0.05
  synthesis_interval: 3
  force_exploration_interval: 2
  entropy_convergence_threshold: 0.1
  keep_top_k: 10
  new_candidate_weight: 0.1
  early_stopping_fitness: 0.95
  early_stopping_iterations: 10
  min_interventions_per_iteration: 3
  uncertainty_sampling_fallback: true
  absolute_max_iterations: 200
  convergence:
    validation_accuracy_threshold: 0.85
    min_improvement: 0.02
    min_iterations_for_convergence: 5
    entropy_threshold: 0.1
  force_exploration:
    enabled: true
    consecutive_iterations_without_intervention: 3
    num_forced_prompts: 3

cognitive:
  anomaly_threshold: 0.1
  anomaly_selection:
    method: "percentile"
    percentile: 85
    min_interventions: 3
    max_interventions: 10
    history_window: 5
    exploration_decay: true
  llm_model: "gemma"

strategist:
  use_llm: true
  max_chain_depth: 3
  max_candidates_heuristic: 100
  max_candidates_llm: 20
  num_trials: 3

researcher:
  max_depth: 6
  beam_width: 500
  error_tolerance: 0.05
  top_k_candidates: 30
  use_cvc5: false
  enforce_cvc5_first: false

victim:
  ollama_url: "http://localhost:11434"
  model_name: "llama3.1:8b"
  temperature: 0.0
  max_tokens: 100

red_team:
  enabled: true
  strategies: ["cipher", "roleplay", "crescendo", "skeleton_key"]
  refinement_rounds: 3

synthesis:
  mode: "evolutionary"
  evolutionary:
    population_size: 100
    generations: 30
    mutation_rate: 0.2
    crossover_rate: 0.7
  neural:
    embedding_model: "all-MiniLM-L6-v2"
    bandit_algorithm: "ucb"
  fitness_guided:
    max_depth: 6
    beam_width: 500
  error_tolerance: 0.05

surrogate:
  enabled: true
  model: "mlp"
  feature_type: "embedding"
  min_accuracy: 0.65

causal_graph:
  min_samples_per_group: 10
  use_bayesian: true

transforms:
  disabled: []
