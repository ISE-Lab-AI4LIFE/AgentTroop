use_async: true
num_seeds: 5
orchestrator:
  max_iterations: 25
  max_interventions: 100
  accuracy_threshold: 0.70
  allow_error_rate: 0.05
  synthesis_interval: 3
  force_exploration_interval: 2
  entropy_convergence_threshold: 0.1
cognitive:
  anomaly_threshold: 0.1
  llm_model: "gemma"
strategist:
  use_llm: true
  max_chain_depth: 2
  max_candidates_heuristic: 100
  max_candidates_llm: 10
  num_trials: 3
researcher:
  max_depth: 4
  beam_width: 200
  allow_error_rate: 0.05
  top_k_candidates: 30
  use_cvc5: true
  enforce_cvc5_first: true
  cvc5_path: /opt/homebrew/bin/cvc5
victim:
  ollama_url: "http://localhost:11434"
  model_name: "llama3.1:8b"
  temperature: 0.0
  max_tokens: 100
red_team:
  population_size: 10
  refinement_rounds: 3
  mutation_rate: 0.3
  crossover_rate: 0.5
  max_chain_depth: 3
  enable_self_eval: false

transforms:
  disabled: []
