use_async: false

orchestrator:
  max_iterations: 3
  max_interventions: 20
  accuracy_threshold: 0.85
  error_tolerance: 0.05
  synthesis_interval: 10
  force_exploration_interval: 10
  entropy_convergence_threshold: 0.1
  keep_top_k: 10
  new_candidate_weight: 0.1
  early_stopping_fitness: 0.95
  early_stopping_iterations: 10

cognitive:
  anomaly_threshold: 0.1
  llm_model: "gemma"

strategist:
  use_llm: true
  max_chain_depth: 1
  max_candidates_heuristic: 100
  max_candidates_llm: 20
  num_trials: 3

researcher:
  max_depth: 6
  beam_width: 500
  error_tolerance: 0.05
  top_k_candidates: 30
  use_cvc5: false
  enforce_cvc5_first: false

victim:
  ollama_url: "http://localhost:11434"
  model_name: "llama3.1:8b"
  temperature: 0.0
  max_tokens: 100

red_team:
  enabled: true
  strategies: ["cipher", "roleplay", "crescendo", "skeleton_key"]
  refinement_rounds: 2

synthesis:
  mode: "evolutionary"
  evolutionary:
    population_size: 100
    generations: 30
    mutation_rate: 0.2
    crossover_rate: 0.7
  neural:
    embedding_model: "all-MiniLM-L6-v2"
    bandit_algorithm: "ucb"
  fitness_guided:
    max_depth: 6
    beam_width: 500
  error_tolerance: 0.05

surrogate:
  enabled: true
  model: "mlp"
  feature_type: "embedding"
  min_accuracy: 0.65

causal_graph:
  min_samples_per_group: 10
  use_bayesian: true

transforms:
  enabled:
    - to_lowercase
    - add_prefix
    - add_suffix
    - remove_punctuation
    - add_role_play
    - to_interrogative
    - to_imperative
    - to_declarative
  disabled:
    - add_zero_width_chars
