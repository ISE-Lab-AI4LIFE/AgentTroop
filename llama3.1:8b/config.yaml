use_async: false

orchestrator:
  max_iterations: 30
  max_interventions: 300
  accuracy_threshold: 0.85
  allow_error_rate: 0.05
  synthesis_interval: 3
  force_exploration_interval: 2

cognitive:
  anomaly_threshold: 0.1
  llm_model: "gemma"

strategist:
  use_llm: true
  max_chain_depth: 1
  max_candidates_heuristic: 100
  max_candidates_llm: 20
  num_trials: 3

researcher:
  max_depth: 4
  beam_width: 200
  allow_error_rate: 0.05
  use_cvc5: true
  cvc5_path: "cvc5"

victim:
  ollama_url: "http://localhost:11434"
  model_name: "llama3.1:8b"
  temperature: 0.0
  max_tokens: 100

transforms:
  enabled:
    - to_lowercase
    - add_prefix
    - add_suffix
    - insert_typos
    - remove_punctuation
    - add_role_play
    - to_interrogative
    - to_imperative
    - to_declarative
  disabled:
    - rot13
    - base64
    - rail_fence_cipher
    - vigenere_cipher
    - unicode_obfuscate
    - add_zero_width_chars
    - url_encode
    - hex_encode
